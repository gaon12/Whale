---
name: Quality gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Biome and JavaScript checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Audit Node dependencies
        run: npm audit

      - name: Check formatting
        run: npm run format:check

      - name: Run Biome lint
        run: npm run lint

      - name: Check JavaScript syntax
        run: npm test

  php:
    name: PHPCS and PHPStan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Audit PHP dependencies
        run: composer audit

      - name: Run PHPCS
        run: composer test

      - name: Run PHPStan level max
        run: composer analyse
